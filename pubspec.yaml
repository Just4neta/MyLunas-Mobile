name: mylunas_new
description: Aplikasi mobile MyLUNAS untuk kemudahan staf
publish_to: 'none'
version: 1.0.1+20

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_secure_storage: ^9.0.0
  http: ^1.1.0
  flutter_inappwebview: ^6.0.0
  cupertino_icons: ^1.0.6
  image_picker: ^1.0.4
  file_picker: ^8.0.0+1
  permission_handler: ^11.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/Pi7_Tool_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
